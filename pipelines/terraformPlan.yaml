pipeline:
  name: Terraform Plan
  identifier: Terraform_Plan
  projectIdentifier: default_project
  orgIdentifier: default
  stages:
    - stage:
        name: Terraform Plan
        identifier: Terraform_Plan
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: Set Terraform Version
                  identifier: Set_Terraform_Version
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          export PATH="/usr/local/tfenv/bin:$PATH"
                          tfenv use <+pipeline.variables.terraformVersion>
                          terraform --version
                    environmentVariables: []
                    outputVariables: []
                  delegateSelectors:
                    - docker-delegate
              - step:
                  type: TerraformPlan
                  name: Terraform Plan
                  identifier: Terraform_Plan_Step
                  spec:
                    provisionerIdentifier: mypipelinename
                    configuration:
                      secretManagerRef: harnessSecretManager
                      command: Apply
                      providerCredential:
                        type: Aws
                        spec:
                          connectorRef: myawsaccount
                          region: us-east-1
                      backendConfig:
                        type: Inline
                        spec:
                          content: |
                            bucket = "eshika-terraform-state-bucket"
                            key    = "<+pipeline.variables.repoUrl>/terraform.tfstate"
                            region = "us-east-1"
                      configFiles:
                        store:
                          type: Github
                          spec:
                            connectorRef: mygithubaccount
                            gitFetchType: Branch
                            repoName: <+pipeline.variables.repoUrl>
                            branch: <+pipeline.variables.branch>
                            folderPath: <+pipeline.variables.terraformDir>
                  delegateSelectors:
                    - docker-delegate
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
  variables:
    - name: repoUrl
      type: String
      value: <+input>
      description: GitHub repo name e.g. myorg/myrepo
    - name: branch
      type: String
      value: <+input>
      description: Branch to clone e.g. main
    - name: terraformDir
      type: String
      value: <+input>
      description: Path to terraform directory e.g. terraform/
    - name: terraformVersion
      type: String
      value: <+input>
      description: Terraform version to use
      allowedValues:
        - 1.7.5
        - 1.8.3
        - 1.4.4
        - 1.6.6
