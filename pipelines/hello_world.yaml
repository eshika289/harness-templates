pipeline:
  name: Hello World
  identifier: Hello_World
  projectIdentifier: default_project
  orgIdentifier: default
  stages:
    - stage:
        name: Checkout Code
        identifier: Checkout_Code
        template:
          templateRef: Checkout_Code
          versionLabel: "0.0.1"
          templateInputs:
            type: CI
            variables:
              - name: repoUrl
                type: String
                value: <+input>
              - name: branch
                type: String
                value: <+input>
