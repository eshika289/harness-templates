pipeline:
  name: Vault AWS Credentials Test
  identifier: vault_aws_creds_test
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: Fetch AWS Creds from Vault
        identifier: fetch_aws_creds
        type: Custom
        spec:
          execution:
            steps:

              # ═══════════════════════════════════════════════
              # STEP GROUP: Vault Auth + AWS Identity Check
              # Shared env vars available to all steps inside
              # ═══════════════════════════════════════════════
              - stepGroup:
                  name: Vault AWS Auth
                  identifier: vault_aws_auth_group
                  delegateSelectors:
                    - docker-delegate
                  sharedPaths: []
                  environmentVariables:
                    - name: VAULT_ADDR
                      type: String
                      value: http://vault:8200
                    - name: VAULT_ROLE_ID
                      type: Secret
                      value: vault-role-id
                    - name: VAULT_SECRET_ID
                      type: Secret
                      value: vault-secret-id
                    - name: AWS_REGION
                      type: String
                      value: us-east-1
                  steps:

                    # -----------------------------------------------
                    # STEP 1: Validate Vault CLI exists
                    # -----------------------------------------------
                    - step:
                        name: Vault Version Check
                        identifier: vault_version_check
                        type: ShellScript
                        spec:
                          shell: Bash
                          onDelegate: true
                          source:
                            type: Inline
                            spec:
                              script: |
                                #!/bin/bash
                                set -e

                                echo "Checking Vault CLI..."
                                vault --version

                                echo "Vault address: $VAULT_ADDR"
                          environmentVariables: []
                          outputVariables: []
                        timeout: 2m

                    # -----------------------------------------------
                    # STEP 2: Login to Vault via AppRole
                    # Fetch STS creds, write to execution-scoped file
                    # -----------------------------------------------
                    - step:
                        name: Vault AppRole Login and Fetch AWS Creds via STS
                        identifier: vault_approle_login
                        type: ShellScript
                        spec:
                          shell: Bash
                          onDelegate: true
                          source:
                            type: Inline
                            spec:
                              script: |
                                #!/bin/bash
                                set -e

                                echo "Logging into Vault via AppRole..."
                                export VAULT_TOKEN=$(vault write -field=token auth/approle/login \
                                  role_id="$VAULT_ROLE_ID" \
                                  secret_id="$VAULT_SECRET_ID")

                                echo "✓ Vault login successful"
                                echo "  Token prefix: $(echo $VAULT_TOKEN | cut -c1-8)..."

                                echo ""
                                echo "Fetching temporary AWS STS credentials..."

                                AWS_ACCESS_KEY_ID=$(vault read -field=access_key aws/sts/harness-aws-role)
                                AWS_SECRET_ACCESS_KEY=$(vault read -field=secret_key aws/sts/harness-aws-role)
                                AWS_SESSION_TOKEN=$(vault read -field=security_token aws/sts/harness-aws-role)

                                echo "✓ STS credentials fetched"
                                echo "  Access Key prefix: $(echo $AWS_ACCESS_KEY_ID | cut -c1-4)..."

                                # Confirm STS (ASIA prefix) not IAM user (AKIA prefix)
                                if echo "$AWS_ACCESS_KEY_ID" | grep -q "^ASIA"; then
                                  echo "✓ Confirmed STS temporary credentials (ASIA prefix)"
                                else
                                  echo "✗ WARNING: Expected ASIA prefix, got: $(echo $AWS_ACCESS_KEY_ID | cut -c1-4)"
                                  exit 1
                                fi

                                # Write to execution-scoped credentials file
                                # Isolated per pipeline run — no collision with other pipelines
                                EXEC_DIR="/tmp/harness-<+pipeline.executionId>"
                                mkdir -p "$EXEC_DIR"

                                cat > "$EXEC_DIR/aws-credentials" <<EOF
                                [default]
                                aws_access_key_id=$AWS_ACCESS_KEY_ID
                                aws_secret_access_key=$AWS_SECRET_ACCESS_KEY
                                aws_session_token=$AWS_SESSION_TOKEN
                                EOF

                                chmod 600 "$EXEC_DIR/aws-credentials"
                                echo "✓ Credentials written to $EXEC_DIR/aws-credentials"

                                # Revoke vault token — no longer needed
                                #vault token revoke "$VAULT_TOKEN"
                                unset VAULT_TOKEN
                                #echo "✓ Vault token revoked"
                          environmentVariables: []   # inherited from step group
                          outputVariables: []        # no passing between steps needed
                        timeout: 5m

                    # -----------------------------------------------
                    # STEP 3: Verify AWS identity using STS creds
                    # Reads from execution-scoped credentials file
                    # -----------------------------------------------
                    - step:
                        name: AWS STS Get Caller Identity
                        identifier: aws_sts_get_caller_identity
                        type: ShellScript
                        spec:
                          shell: Bash
                          onDelegate: true
                          source:
                            type: Inline
                            spec:
                              script: |
                                #!/bin/bash
                                set -e

                                # Point AWS SDK to execution-scoped credentials file
                                export AWS_SHARED_CREDENTIALS_FILE="/tmp/harness-<+pipeline.executionId>/aws-credentials"
                                export AWS_DEFAULT_REGION="$AWS_REGION"

                                echo "Verifying AWS identity with STS credentials..."
                                IDENTITY=$(aws sts get-caller-identity)

                                echo ""
                                echo "✓ AWS Identity confirmed:"
                                echo "  Account: $(echo $IDENTITY | jq -r '.Account')"
                                echo "  UserID:  $(echo $IDENTITY | jq -r '.UserId')"
                                echo "  ARN:     $(echo $IDENTITY | jq -r '.Arn')"

                                ARN=$(echo $IDENTITY | jq -r '.Arn')
                                if echo "$ARN" | grep -q "assumed-role/VaultHarnessRole"; then
                                  echo ""
                                  echo "✓ Confirmed: running as VaultHarnessRole (not vault-admin-user)"
                                else
                                  echo ""
                                  echo "✗ WARNING: Not running as expected role. ARN: $ARN"
                                  exit 1
                                fi
                          environmentVariables: []   # inherited from step group
                          outputVariables: []
                        timeout: 5m

                    # -----------------------------------------------
                    # STEP 4: Cleanup
                    # Always runs — even if previous steps fail
                    # -----------------------------------------------
                    - step:
                        name: Cleanup Credentials
                        identifier: cleanup_credentials
                        type: ShellScript
                        spec:
                          shell: Bash
                          onDelegate: true
                          source:
                            type: Inline
                            spec:
                              script: |
                                #!/bin/bash

                                EXEC_DIR="/tmp/harness-<+pipeline.executionId>"

                                if [ -d "$EXEC_DIR" ]; then
                                  rm -rf "$EXEC_DIR"
                                  echo "✓ Credentials cleaned up: $EXEC_DIR"
                                else
                                  echo "Nothing to clean up"
                                fi
                          environmentVariables: []
                          outputVariables: []
                          when:
                            stageStatus: All   # runs on success AND failure
                        timeout: 2m

                  # Failure strategy for the whole group
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: StageRollback
