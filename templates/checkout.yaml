template:
  name: Checkout Code
  identifier: Checkout_Code
  versionLabel: "0.0.1"
  type: Stage
  projectIdentifier: default_project
  orgIdentifier: default
  spec:
    type: CI
    variables:
      - name: repoUrl
        type: String
        value: <+input>
        description: "GitHub repo name e.g. myorg/myrepo"
      - name: branch
        type: String
        value: <+input>
        description: "Branch to clone e.g. main"
    spec:
      cloneCodebase: false
      platform:
        os: Linux
        arch: Arm64
      runtime:
        type: Docker
        spec: {}
      execution:
        steps:
          - step:
              type: GitClone
              name: Clone Repo
              identifier: Clone_Repo
              spec:
                connectorRef: mygithubaccount
                repoName: <+stage.variables.repoUrl>
                build:
                  type: branch
                  spec:
                    branch: <+stage.variables.branch>
          - step:
              type: Run
              name: Echo Clone Info
              identifier: Echo_Clone_Info
              spec:
                shell: Sh
                command: |
                  echo "Cloned repo: <+stage.variables.repoUrl>"
                  echo "Branch: <+stage.variables.branch>"
    failureStrategies:
      - onFailure:
          errors:
            - AllErrors
          action:
            type: StageRollback
