template:
  name: Checkout Code
  identifier: Checkout_Code
  versionLabel: "0.0.1"
  type: Stage
  projectIdentifier: default_project
  orgIdentifier: default
  spec:
    type: Custom
    inputs:
      - name: repoUrl
        type: String
        default: ""
      - name: branch
        type: String
        default: ""
    spec:
      execution:
        steps:
          - step:
              type: ShellScript
              name: Echo Clone Repo
              identifier: Echo_Clone_Repo
              spec:
                shell: Bash
                onDelegate: true
                source:
                  type: Inline
                  spec:
                    script: |
                      echo "Cloning repo: <+stage.variables.repoUrl> on branch: <+stage.variables.branch>"
                environmentVariables: []
                outputVariables: []
          - step:
              type: GitClone
              name: Clone Repo
              identifier: Clone_Repo
              spec:
                connectorRef: mygithubaccount
                repoName: <+stage.variables.repoUrl>
                build:
                  type: branch
                  spec:
                    branch: <+stage.variables.branch>
    variables:
      - name: repoUrl
        type: String
        value: <+input>
        description: "GitHub repository name to clone"
      - name: branch
        type: String
        value: <+input>
        description: "Branch to clone"
